name: Sync Match Results

on:
  workflow_dispatch: # manual trigger only — schedule moved to cron-job.org

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call sync endpoint
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST https://predicelo.vercel.app/api/cron/sync-matches \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -H "Content-Type: application/json")
          echo "HTTP status: $response"
          if [ "$response" != "200" ]; then
            echo "Sync failed with status $response"
            exit 1
          fi
